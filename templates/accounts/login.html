{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow">

  <h2 class="text-2xl font-bold mb-6 text-blue-500 text-center">Login</h2>

  <form id="loginForm" class="space-y-4">

    <input
      id="email"
      type="email"
      placeholder="Email"
      class="w-full border p-2 rounded"
    >

    <div class="relative">
      <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full border p-2 rounded pr-10"
      >

      <button
        type="button"
        id="togglePassword"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black"
      >
        <svg xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24">
          <path d="M2 12s4-8 10-8 10 8 10 8-4 8-10 8-10-8-10-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="w-full bg-gray-700 text-white p-2 rounded hover:bg-gray-800">
      Увійти
    </button>

  </form>

  <p class="text-center text-sm mt-4">
    Немає акаунта?
    <a href="/register" class="text-blue-500 hover:underline">
      Зареєструватися
    </a>
  </p>

</div>

<script>
const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

if (togglePassword && passwordInput) {
  togglePassword.addEventListener("click", function () {
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
    } else {
      passwordInput.type = "password";
    }
  });
}
</script>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault()

  const data = {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  }

  const response = await fetch("/accounts/login/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })

  const result = await response.json()

  if (response.ok && result.access) {
    localStorage.setItem("token", result.access)
    window.location.href = "/account"
  } else {
    alert(
      result.non_field_errors?.[0] ||
      result.detail ||
      "Невірний email або пароль"
    )
  }
})
</script>

{% endblock %}
