<!doctype html>
<html>
  <head>
    <title>Сервісні центри Києва</title>
  </head>
  <body>
    <h1>Сервісні центри Києва</h1>

    <form method="get">
      <input
        type="text"
        name="q"
        placeholder="Пошук сервісного центру..."
        value="{{ request.GET.q }}"
        autocomplete="off"
      />
      <button type="submit">Знайти</button>
    </form>

    {% if services %}
    <ul>
      {% for service in services %}
      <li>
        <strong>
          <a href="/services/{{ service.id }}/">
            {{ service.name }}
          </a> </strong
        ><br />
        📍 {{ service.city }}<br />
        🏠 {{ service.address }}<br />
        📞 {{ service.phone }}
      </li>
      <hr />
      {% endfor %}
    </ul>
    {% else %}
    <p>Поки немає сервісних центрів.</p>
    {% endif %}
  </body>
</html>
